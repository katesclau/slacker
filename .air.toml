root = "."
tmp_dir = "tmp"

[build]
cmd = "make db-migrate && go build -o ./tmp/slacker ./cmd/slacker"
bin = "./tmp/slacker"
full_bin = "./tmp/slacker"
include_ext = ["go", "tpl", "tmpl", "html", "sql", "yaml", "yml", "json", "env"]
exclude_dir = ["tmp", "vendor", "coverage", ".git"]
exclude_file = []
delay = 300
stop_on_error = true
send_interrupt = true
kill_delay = 500
log = "build-errors.log"

[color]
main = "magenta"
watcher = "cyan"
build = "yellow"
runner = "green"

[log]
time = true

[misc]
clean_on_exit = true
